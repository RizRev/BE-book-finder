name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/be-book-finder:latest
            ${{ secrets.DOCKER_USERNAME }}/be-book-finder:${{ github.run_number }}

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            mkdir -p /opt/be-book-finder

            cat > /opt/be-book-finder/.env << 'ENVEOF'
            PORT=4000
            DB_USER=${{ secrets.DB_USER }}
            DB_HOST=${{ secrets.DB_HOST }}
            DB_DATABASE=${{ secrets.DB_DATABASE }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_PORT=${{ secrets.DB_PORT }}
            ENVEOF

            cd /opt/be-book-finder
            export IMAGE=${{ secrets.DOCKER_USERNAME }}/be-book-finder:${{ github.run_number }}
            export PREV_TAG=$(cat .last_tag 2>/dev/null || echo "latest")
            echo ${{ github.run_number }} > .last_tag
            bash deploy.sh "$IMAGE" "$PREV_TAG"
